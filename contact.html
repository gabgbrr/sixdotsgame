<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCAP Something Something</title>

    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 16px;
            font-weight: 500;
            overflow-x: hidden;
            background-color: #f8f8f8;
        }

        a {
            text-decoration: none;
            color: #f0f0f0;
            transition: 0.3s;
        }

        .headerlinks:hover {
            transition: 0.3s;
            color: #6abba9;
        }

        #links {
            border: solid 0.5px;
            padding-top: 0.5em;
            padding-bottom: 0.5em;
            border-color: #3d5a80;
            background-color: #3d5a80;
            position: absolute;
            width: 100%;
            top: 0px;
            left: 0px;
        }

        #pageheader {
            transition: 0.3s;
            background-color: #d1d8f7;
            padding: 10em;
        }

        .team_fr {
            display: grid;
            grid-template-columns: auto auto auto;
            overflow: hidden;
            text-align: center;
            
        }

        #img_placeholder {
            transition: 0.5s;
            border: solid 1px;
            border-radius: 2px;
            object-fit: cover;
        }

        #img_placeholder:hover {
            transition: 0.3s;
            transform: scale(1.05);
        }

        #member_pl {
            padding: 4em;
        }

        #subtext {
            font-weight: 300;
        }
    </style>
</head>
<body>
    <div id="links">
        <img src="logo.png" alt="RCAP Product Logo" style="object-fit: cover; padding-left: 1em;" width="70" height="70"><!--300x300 best-->
            <a href="index.html" style="padding-left: 5em;" class="headerlinks">Home</a>
            <a href="ourinfo.html" style="padding-left: 3em;" class="headerlinks">About</a>
            <a href="contact.html" style="padding-left: 3em;" class="headerlinks">Contact Us</a>
    </div>  

    <section id="pageheader">
        <h1 style="text-align: center; font-size: 48px;">Contact Us</h1>
        <h3 style="text-align: center; font-weight: 300;"></h3>
    </section>

    <section id="contactform">
        <input type="text" placeholder="First Name">
        <input type="text" placeholder="Last Name"><br />
        <input type="text" placeholder="Email Address"><br />
        <input type="text" placeholder="Contact Information">
    </section>

</body>
</html>
